services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
        VITE_BACKEND_ROOT_URL: ""
    container_name: shopops-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - shopops
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shopops-backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://shopops:shopops@postgres:5432/shopops
      REDIS_URL: redis://redis:6379/0
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      LOGSTASH_ENABLED: "true"
      LOGSTASH_HOST: logstash
      LOGSTASH_PORT: "5000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      jaeger:
        condition: service_healthy
      logstash:
        condition: service_healthy
    networks:
      - shopops
    command: >
      sh -c "alembic upgrade head &&
      gunicorn -k uvicorn.workers.UvicornWorker -w 4 -b 0.0.0.0:8000 app.main:app"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health').read()\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: shopops-postgres
    environment:
      POSTGRES_DB: shopops
      POSTGRES_USER: shopops
      POSTGRES_PASSWORD: shopops
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - shopops
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopops -d shopops"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: shopops-redis
    networks:
      - shopops
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: shopops-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - shopops
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9090/-/healthy >/dev/null 2>&1 || curl -fsS http://127.0.0.1:9090/-/healthy >/dev/null 2>&1"]
      interval: 20s
      timeout: 8s
      retries: 6
      start_period: 20s
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    container_name: shopops-grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - shopops
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health | grep -q 'ok' || curl -fsS http://127.0.0.1:3000/api/health | grep -q 'ok'"]
      interval: 20s
      timeout: 8s
      retries: 6
      start_period: 30s
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.60
    container_name: shopops-jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    networks:
      - shopops
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:14269/ >/dev/null 2>&1 || curl -fsS http://127.0.0.1:14269/ >/dev/null 2>&1"]
      interval: 20s
      timeout: 8s
      retries: 6
      start_period: 20s
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: shopops-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      xpack.security.enrollment.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - shopops
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9200/_cluster/health?wait_for_status=yellow&timeout=5s >/dev/null"]
      interval: 20s
      timeout: 8s
      retries: 10
      start_period: 40s
    restart: unless-stopped

  logstash:
    image: docker.elastic.co/logstash/logstash:8.15.3
    container_name: shopops-logstash
    depends_on:
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./monitoring/elk/logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./monitoring/elk/logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
    ports:
      - "5000:5000"
      - "9600:9600"
    networks:
      - shopops
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9600/_node/pipelines >/dev/null"]
      interval: 20s
      timeout: 8s
      retries: 10
      start_period: 40s
    restart: unless-stopped

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.3
    container_name: shopops-kibana
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "5601:5601"
    networks:
      - shopops
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:5601/api/status >/dev/null"]
      interval: 20s
      timeout: 8s
      retries: 10
      start_period: 60s
    restart: unless-stopped

volumes:
  postgres_data:
  grafana_data:
  elasticsearch_data:

networks:
  shopops:
    name: shopops-network
