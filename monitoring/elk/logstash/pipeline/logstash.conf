input {
  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  if ![service] {
    mutate {
      add_field => { "service" => "shopops-api" }
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "shopops-logs-%{+YYYY.MM.dd}"
  }
  stdout {
    codec => rubydebug
  }
}
